<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <title>Add Article</title>
</head>

<body>
    <div class="container">
        <h1>Add an Article</h1>
        <form method="POST" action="https://localhost/api/articles" id="articleForm">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>

            <label for="content">Content:</label>
            <textarea id="content" name="content" rows="5" required></textarea>
            <label for="author">Author:</label>
            <select id="author" name="author" required aria-placeholder="Select an author"></select>
            </select>
            <button type="submit">Submit</button>
        </form>
        <div id="error" style="color: red; margin: 6px;"></div>
        <div id="success" style="color: green; margin: 6px;"></div>
        <div style="display: flex; flex-direction: row;">
            <button class="back-button" onclick='window.location.href="https://localhost/articles"'>
                Back to Articles
            </button>
            <button class="back-button" onclick='window.location.href="https://localhost/author/add"'>
                Create New Author
            </button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authorSelect = document.getElementById('author');
            try {
                const response = await fetch('https://localhost/api/authors/get/all');
                if (response.ok) {
                    const authors = await response.json();
                    authors.forEach(author => {
                        const option = document.createElement('option');
                        option.value = author.id;
                        option.textContent = author.name;
                        authorSelect.appendChild(option);
                    });
                } else {
                    alert('Failed to load authors');
                }
            } catch (error) {
                console.error('Error fetching authors:', error);
                alert('An error occurred while loading authors');
            }
        });

        document.getElementById('articleForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const form = event.target;
            const formData = {
                title: form.title.value,
                content: form.content.value,
            };

            const response = await fetch('https://localhost/api/articles/post/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData),
            });

            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            if (response.ok) {
                errorDiv.textContent = '';
                alert('Article added successfully!');
                form.reset();
            } else {
                const error = await response.json();
                errorDiv.textContent = `Error: ${error.error}`;
            }
        });
    </script>
</body>

</html>
