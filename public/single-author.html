<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">
    <title>Author</title>
</head>

<body>
    <div class="container">
        <h1>Author</h1>
        <h3 id="name"></h3>
        <span id="error"></span>
        <div class="load-authors-articles"></div>
        <button onclick="window.location.href = '/'">Go Back</button>
        <button onclick="window.location.href='/articles'">Go to Articles</button>
    </div>
</body>

</html>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const name = document.getElementById("name");
        const error = document.getElementById("error");
        const articlesContainer = document.querySelector(".load-authors-articles");
        const authorID = document.location.pathname.split("/").pop();

        fetch(`/api/authors/get/${authorID}`)
            .then(response => response.json())
            .then(data => {
                name.innerHTML = data.name;
            })
            .catch(err => {
                console.error("Error fetching author:", err);
                error.innerHTML = "Error loading author";
            });

        fetch(`/api/articles/get/author/${authorID}`)
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    articlesContainer.innerHTML = "<p>No articles found for this author.</p>";
                } else {
                    data.forEach(article => {
                        const articleElement = document.createElement("div");
                        articleElement.innerHTML = `<h4>${article.title}</h4><p>${article.content}</p>`;
                        articlesContainer.appendChild(articleElement);
                    });
                }
            })
            .catch(err => {
                console.error("Error fetching articles:", err);
                articlesContainer.innerHTML = "Error loading articles";
            });
    });
</script>
